header {

.tab-bar {
display: flex; gap: 0; overflow-x: auto;
border-bottom: 1px solid rgba(255,255,255,0.1);
scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab {
flex-shrink: 0; padding: 10px 14px;
background: transparent; border: none;
border-bottom: 2px solid transparent;
color: rgba(240,237,232,0.45);
font-family: sans-serif; font-size: 11px; font-weight: 700;
cursor: pointer; text-align: center; line-height: 1.3;
transition: color .15s; white-space: nowrap;
}
.tab.active { color: #7EC8A0; border-bottom-color: #7EC8A0; }
.tab .tab-label { display: block; }
.tab .tab-sub { display: block; font-size: 9px; opacity: 0.6; margin-top: 1px; }

.progress-bar { height: 3px; background: rgba(255,255,255,0.1); }
.progress-fill { height: 100%; background: #7EC8A0; transition: width .4s; }

main { padding: 16px 16px 80px; max-width: 680px; margin: 0 auto; }

.day-panel { display: none; }
.day-panel.active { display: block; }

.day-header {
display: flex; align-items: center; gap: 12px;
margin-bottom: 16px; padding: 14px 16px;
border-radius: 14px; color: white;
}
.day-header .emoji { font-size: 28px; }
.day-header h2 { font-size: 18px; font-weight: bold; }
.day-header .meta { font-size: 12px; opacity: 0.8; font-family: sans-serif; margin-top: 2px; }
.badge {
margin-left: auto; padding: 4px 10px; border-radius: 100px;
font-size: 10px; font-family: sans-serif; font-weight: 700;
background: rgba(255,255,255,0.2); white-space: nowrap;
}

.section-label {
font-size: 10px; font-weight: 700; letter-spacing: 2px;
text-transform: uppercase; color: #888;
font-family: sans-serif; margin: 18px 0 8px 4px;
}

.item {
background: white; border-radius: 12px; margin-bottom: 6px;
border: 1.5px solid #E8E4DF;
box-shadow: 0 1px 4px rgba(0,0,0,0.04);
overflow: hidden; transition: border-color .15s;
}
.item.done { border-color: #7EC8A080; }

.item-row {
display: flex; align-items: center; gap: 12px;
padding: 11px 14px; cursor: pointer;
}
.check {
width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
border: 2px solid #CCC; background: white;
display: flex; align-items: center; justify-content: center;
font-size: 11px; color: white; transition: all .15s;
}
.item.done .check { background: #7EC8A0; border-color: #7EC8A0; }
.item.done .ex-name { text-decoration: line-through; color: #AAA; }

.ex-name  { font-size: 14px; font-weight: 700; color: #1C2A3A; font-family: sans-serif; flex: 1; }
.ex-detail{ font-size: 11px; color: #999; font-family: sans-serif; margin-top: 2px; }

.expand-btn {
background: none; border: none; color: #CCC;
font-size: 16px; cursor: pointer; padding: 0 4px;
transition: transform .2s; flex-shrink: 0;
}
.item.expanded .expand-btn { transform: rotate(180deg); }

.detail-panel {
display: none; background: #f9f7f5;
border-top: 1px solid #EEE; padding: 12px 14px 14px;
font-size: 13px; font-family: sans-serif; color: #444; line-height: 1.6;
}
.item.expanded .detail-panel { display: block; }
.detail-panel strong {
color: #1C2A3A; display: block;
margin-top: 8px; margin-bottom: 2px;
font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
}
.detail-panel strong:first-child { margin-top: 0; }

.day-progress {
font-size: 11px; font-family: sans-serif;
color: rgba(240,237,232,0.55); margin-top: 6px;
}

.reset-btn {
position: fixed; bottom: 20px; right: 20px;
background: #1C2A3A; color: white; border: none;
border-radius: 100px; padding: 10px 18px;
font-size: 12px; font-family: sans-serif; font-weight: 700;
cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
</style>

</head>

// ── Day colours ──
const DAY_COLORS = {
  upperA: "#2980b9", upperB: "#27ae60",
  lowerA: "#8e44ad", lowerB: "#e67e22",
  coreA:  "#16a085", coreB:  "#c0392b",
};

// ── Storage ──
function loadState() {
  try { return JSON.parse(localStorage.getItem("split_v1") || "{}"); }
  catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem("split_v1", JSON.stringify(s)); } catch {}
}

let state = loadState();
let activeDay = DAYS[0].id;

// ── Build UI ──
function build() {
  const tabBar = document.getElementById("tabBar");
  const main   = document.getElementById("main");
  tabBar.innerHTML = "";
  main.innerHTML   = "";

  DAYS.forEach(day => {
    // Tab
    const btn = document.createElement("button");
    btn.className = "tab" + (day.id === activeDay ? " active" : "");
    btn.innerHTML = `<span class="tab-label">${day.label}</span><span class="tab-sub">${day.sub}</span>`;
    btn.onclick = () => { activeDay = day.id; build(); };
    tabBar.appendChild(btn);

    // Panel
    const panel = document.createElement("div");
    panel.className = "day-panel" + (day.id === activeDay ? " active" : "");

    // Day header
    const allEx = day.sections.flatMap(s => s.exercises);
    const doneCount = allEx.filter((_, i) => state[`${day.id}_${flatIdx(day, i)}`]).length;
    const hdr = document.createElement("div");
    hdr.className = "day-header";
    hdr.style.background = DAY_COLORS[day.id];
    hdr.innerHTML = `
      <div class="emoji">${day.emoji}</div>
      <div>
        <h2>${day.label}</h2>
        <div class="meta">${day.desc}</div>
        <div class="day-progress">${doneCount} / ${allEx.length} done</div>
      </div>
      <div class="badge">${day.location}</div>`;
    panel.appendChild(hdr);

    // Sections
    let globalIdx = 0;
    day.sections.forEach(sec => {
      const secLabel = document.createElement("div");
      secLabel.className = "section-label";
      secLabel.textContent = sec.label;
      panel.appendChild(secLabel);

      sec.exercises.forEach((ex, _) => {
        const idx = globalIdx++;
        const key = `${day.id}_${idx}`;
        const done = !!state[key];

        const item = document.createElement("div");
        item.className = "item" + (done ? " done" : "");
        item.id = key;

        item.innerHTML = `
          <div class="item-row" onclick="toggleItem('${key}', event)">
            <div class="check">${done ? "✓" : ""}</div>
            <div style="flex:1">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-detail">${ex.detail}</div>
            </div>
            <button class="expand-btn" onclick="expandItem('${key}', event)">⌄</button>
          </div>
          <div class="detail-panel">
            <strong>📐 Setup</strong>${ex.setup}
            <strong>▶️ Execution</strong>${ex.execution}
            <strong>⚠️ Common Mistakes</strong>${ex.mistakes}
            <strong>💡 Why This Matters</strong>${ex.why}
          </div>`;

        panel.appendChild(item);
      });
    });

    main.appendChild(panel);
  });

  updateProgress();
}

function flatIdx(day, globalIdx) { return globalIdx; }

function toggleItem(key, e) {
  if (e.target.classList.contains("expand-btn")) return;
  state[key] = !state[key];
  saveState(state);
  build();
}

function expandItem(key, e) {
  e.stopPropagation();
  const item = document.getElementById(key);
  if (item) item.classList.toggle("expanded");
}

function updateProgress() {
  const day = DAYS.find(d => d.id === activeDay);
  if (!day) return;
  const allEx = day.sections.flatMap(s => s.exercises);
  const done  = allEx.filter((_, i) => state[`${day.id}_${i}`]).length;
  const pct   = allEx.length ? (done / allEx.length * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";
}

function resetDay() {
  if (!confirm(`Reset all checkboxes for ${activeDay}?`)) return;
  const day = DAYS.find(d => d.id === activeDay);
  const allEx = day.sections.flatMap(s => s.exercises);
  allEx.forEach((_, i) => { delete state[`${activeDay}_${i}`]; });
  saveState(state);
  build();
}

build();
</script>
