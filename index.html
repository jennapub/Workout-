<title>Weekly Workout Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F0EDE8; font-family: Georgia, serif; min-height: 100vh; }

header {
background: #1C2A3A; color: #F0EDE8;
padding: 18px 20px 12px;
position: sticky; top: 0; z-index: 50;
box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
header h1 { font-size: 20px; font-weight: bold; }
header p  { font-size: 11px; opacity: .45; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; font-family: sans-serif; }

.progress-bar { height: 4px; background: rgba(255,255,255,0.12); border-radius: 100px; margin-top: 10px; }
.progress-fill { height: 100%; background: #7EC8A0; border-radius: 100px; transition: width .4s; }

main { padding: 16px 16px 80px; max-width: 680px; margin: 0 auto; }

.section-header {
font-size: 10px; font-weight: 700; letter-spacing: 2px;
text-transform: uppercase; color: #888;
font-family: sans-serif; margin: 20px 0 8px 4px;
}

.item {
background: white; border-radius: 12px; margin-bottom: 6px;
border: 1.5px solid #E8E4DF;
box-shadow: 0 1px 4px rgba(0,0,0,0.04);
overflow: hidden; transition: border-color .15s;
}
.item.done { border-color: #7EC8A080; }

.item-row {
display: flex; align-items: center; gap: 12px;
padding: 12px 14px; cursor: pointer;
}

.check {
width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
border: 2px solid #CCC; background: white;
display: flex; align-items: center; justify-content: center;
font-size: 12px; color: white; transition: all .15s;
}
.done .check { background: #7EC8A0; border-color: #7EC8A0; }
.done .name  { text-decoration: line-through; color: #AAA; }

.name  { font-size: 14px; font-weight: 700; color: #1C2A3A; font-family: sans-serif; flex: 1; }
.detail{ font-size: 11px; color: #999; font-family: sans-serif; margin-top: 2px; }

.dot {
width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

.expand-btn {
background: none; border: none; color: #BBB;
font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1;
transition: transform .2s;
}
.expanded .expand-btn { transform: rotate(180deg); }

.detail-panel {
display: none; background: #f9f7f5;
border-top: 1px solid #EEE; padding: 12px 14px 14px;
font-size: 13px; font-family: sans-serif; color: #444; line-height: 1.6;
}
.expanded .detail-panel { display: block; }

.detail-panel strong { color: #1C2A3A; display: block; margin-top: 8px; margin-bottom: 2px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
.detail-panel strong:first-child { margin-top: 0; }

.reset-btn {
position: fixed; bottom: 20px; right: 20px;
background: #1C2A3A; color: white; border: none;
border-radius: 100px; padding: 10px 20px;
font-size: 13px; font-family: sans-serif; font-weight: 700;
cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.reset-btn:hover { background: #2a3f58; }

.count-badge {
font-size: 11px; font-family: sans-serif; font-weight: 700;
color: #F0EDE8; opacity: .6; margin-top: 4px;
}
</style>

</head>

// ── Build grouped list ──
function buildList() {
  const container = document.getElementById('list');
  const sections = [...new Set(EXERCISES.map(e => e.section))];
  let html = '';
  sections.forEach(sec => {
    const items = EXERCISES.filter(e => e.section === sec);
    html += `<div class="section-header">${sec}</div>`;
    items.forEach((ex, i) => {
      const id = `ex-${EXERCISES.indexOf(ex)}`;
      html += `
        <div class="item" id="${id}">
          <div class="item-row" onclick="toggle('${id}', event)">
            <div class="check" id="chk-${id}"></div>
            <div style="flex:1">
              <div class="name">${ex.name}</div>
              <div class="detail">${ex.detail}</div>
            </div>
            <button class="expand-btn" onclick="expand('${id}', event)">⌄</button>
          </div>
          <div class="detail-panel">
            <strong>📐 Setup</strong>${ex.setup}
            <strong>▶️ Execution</strong>${ex.execution}
            <strong>⚠️ Common Mistakes</strong>${ex.mistakes}
            <strong>💡 Why This Matters</strong>${ex.why}
          </div>
        </div>`;
    });
  });
  container.innerHTML = html;
  loadState();
  updateProgress();
}

function toggle(id, e) {
  if (e.target.classList.contains('expand-btn')) return;
  const item = document.getElementById(id);
  item.classList.toggle('done');
  saveState();
  updateProgress();
}

function expand(id, e) {
  e.stopPropagation();
  const item = document.getElementById(id);
  item.classList.toggle('expanded');
}

function updateProgress() {
  const total = EXERCISES.length;
  const done = document.querySelectorAll('.item.done').length;
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('countBadge').textContent = `${done} / ${total} done`;
}

function saveState() {
  const done = [...document.querySelectorAll('.item.done')].map(el => el.id);
  localStorage.setItem('wc_state', JSON.stringify(done));
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('wc_state') || '[]');
    saved.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('done');
    });
  } catch {}
}

function resetAll() {
  if (!confirm('Reset all checkboxes for this week?')) return;
  document.querySelectorAll('.item.done').forEach(el => el.classList.remove('done'));
  localStorage.removeItem('wc_state');
  updateProgress();
}

buildList();
</script>
